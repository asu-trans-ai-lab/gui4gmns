<html lang="en">
<head>

<style>
:root {
  --asu:#8C1D40; --asu-dk:#4b0f25; --gold:#FFC627;
  --bg:#f7f8fb; --panel:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --blue:#1d4ed8; --green:#059669; --amber:#d97706; --violet:#7c3aed;
  --red:#b91c1c; --yellow:#facc15;
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family:'Libre Franklin', system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.4;
}
.mono { font-family:'IBM Plex Mono', ui-monospace, Menlo, monospace; }

.top {
  background:linear-gradient(90deg, var(--asu), var(--asu-dk));
  color:#fff; padding:18px 26px; border-bottom:5px solid var(--gold);
}
.top h1 { margin:0; font-size:24px; letter-spacing:.2px; }
.top p { margin:6px 0 0; opacity:.9; font-size:13px; }

.qtabs {
  display:flex; flex-wrap:wrap; gap:6px; padding:12px 20px;
  background:#fff; border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:100;
}
.qtab {
  border:1px solid var(--line); border-radius:999px; background:#fff;
  padding:6px 12px; font-size:13px; cursor:pointer;
  font-family:inherit; color:var(--ink); transition:all .12s;
}
.qtab:hover { border-color:var(--asu); background:#fff7fb; }
.qtab.active { border-color:var(--asu); background:var(--asu); color:#fff; font-weight:700; }
.qtab .qid { font-weight:800; margin-right:6px; }

.wrap { padding:18px 22px 32px; max-width:1500px; margin:0 auto; }

.qcard {
  background:var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:18px 20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.qcard h2 { margin:0 0 6px; font-size:22px; }
.qcard .qsub { color:var(--muted); font-size:13px; margin:0 0 12px; }
.qcard p { margin:6px 0; }
.qcard h3 {
  font-size:12px; text-transform:uppercase; letter-spacing:.06em;
  color:var(--asu); margin:14px 0 6px;
}
.badges { display:flex; flex-wrap:wrap; gap:6px; }
.badge {
  border:1px solid var(--line); border-radius:999px;
  padding:4px 10px; background:#f9fafb; font-size:12px; color:#374151;
}
.task {
  border-left:4px solid var(--gold); background:#fff8e1;
  padding:10px 14px; border-radius:8px; font-size:14px;
}

.grid {
  display:grid; gap:14px;
  grid-template-columns:repeat(auto-fit, minmax(420px, 1fr));
}
.icard {
  background:var(--panel); border:1px solid var(--line); border-radius:14px;
  overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.05);
  display:flex; flex-direction:column;
}
.icard h3.iname { margin:0; padding:12px 14px 6px; font-size:15px; color:var(--ink); }
.icard .pills { padding:0 14px 10px; display:flex; flex-wrap:wrap; gap:6px; }
.pill {
  font-size:11px; padding:3px 9px; border-radius:999px;
  background:#eef2ff; color:#3730a3; font-weight:600; letter-spacing:.02em;
}
.pill.corridor { background:#fef3c7; color:#92400e; }
.pill.ctrl { background:#dcfce7; color:#166534; }

.satwrap { position:relative; height:240px; background:#0a1729; }
.satmap { position:absolute; inset:0; }
.satwrap::after {
  content:""; position:absolute; inset:0; pointer-events:none;
  box-shadow:inset 0 -32px 50px -20px rgba(0,0,0,.45);
}
.satlabel {
  position:absolute; left:10px; bottom:10px; z-index:500; pointer-events:none;
  background:rgba(255,255,255,.94); border-radius:8px; padding:6px 10px;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; font-weight:600; color:var(--ink);
  box-shadow:0 1px 2px rgba(0,0,0,.2);
}

.metrics {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;
  padding:12px 14px 8px;
}
.metric {
  background:#f9fafb; border:1px solid var(--line); border-radius:10px;
  padding:8px 6px; text-align:center;
}
.metric .v { font-weight:800; font-size:18px; color:var(--blue); line-height:1.1; }
.metric .l {
  color:var(--muted); font-size:10px; text-transform:uppercase;
  letter-spacing:.05em; margin-top:2px;
}

.tband { padding:6px 14px 4px; }
.tband .tlabel {
  font-size:11px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.06em; font-weight:600; margin-bottom:4px;
}
.tbar {
  display:flex; height:30px; border-radius:6px; overflow:hidden;
  border:1px solid var(--line); background:#f3f4f6;
}
.tseg {
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  color:#fff; font-size:11px; font-weight:700; min-width:0; overflow:hidden;
  border-right:1px solid rgba(255,255,255,.4); padding:0 4px;
}
.tseg:last-child { border-right:0; }
.tseg .ph { font-size:11px; line-height:1.05; }
.tseg .sp { font-size:10px; opacity:.95; line-height:1; font-family:'IBM Plex Mono', monospace; }

.tbar.thin { height:14px; margin-top:3px; }
.tbar.thin .tseg { font-size:9px; padding:0 2px; font-family:'IBM Plex Mono', monospace; }

.tband .tlegend { display:flex; gap:14px; font-size:10px; color:var(--muted); margin-top:5px; }
.tband .tlegend i {
  display:inline-block; width:8px; height:8px; border-radius:2px;
  margin-right:4px; vertical-align:middle;
}

.movements { padding:8px 14px 6px; }
.movements .mtitle {
  font-size:11px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.06em; font-weight:600; margin-bottom:6px;
}
.chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  display:inline-flex; align-items:center; gap:6px;
  background:#fff; border:1px solid var(--line); border-radius:999px;
  padding:3px 10px 3px 3px; font-size:12px;
}
.chip .dot {
  width:24px; height:24px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  color:#fff; font-size:10px; font-weight:800; letter-spacing:-.02em;
}
.chip .mvc { font-weight:700; font-size:12px; }
.chip .mvd { color:var(--muted); font-size:11px; font-family:'IBM Plex Mono', monospace; }

.callout {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  padding:6px 14px 14px;
}
.cobox {
  background:#f9fafb; border:1px solid var(--line); border-radius:10px;
  padding:8px 10px;
}
.cobox .lab {
  font-size:10px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.05em; font-weight:600;
}
.cobox .val { font-size:13px; font-weight:600; margin-top:3px; }
.cobox .val .mv { color:var(--asu); font-family:'IBM Plex Mono', monospace; }

.empty {
  padding:20px; text-align:center; color:var(--muted); font-style:italic;
  background:#f9fafb; border-radius:10px; margin:8px 14px;
}

@media (max-width:880px) {
  .grid { grid-template-columns:1fr; }
  .metrics { grid-template-columns:repeat(2, 1fr); }
}
</style>
</head>

<script>const PAYLOAD = {"questions": [{"id": "Q1", "title": "Traffic engineering vs. transportation engineering", "question": "How does traffic engineering differ from transportation engineering more broadly, and what are two example specialties mentioned in the slide deck?", "draft_answer": "Transportation engineering is the broader field concerned with planning, land use, travel models, facility needs, and system-level movement of people and goods. Traffic engineering is the more operational, intersection- and street-level part of the field. It focuses on safety, intersection control, signal timing, signing and striping, temporary traffic control, user behavior, and how traffic actually moves through facilities. Two example specialties are signal design/signal operations and operational analysis/ITS.", "dashboard_panels": ["intersection_timing", "movement_summary", "phase_view"], "student_task": "Compare a complex arterial-campus signal with a simpler two-phase signal. Write one sentence about system-level transportation planning and one sentence about field-level traffic engineering decisions.", "example_intersections": ["E UNIVERSITY DR & S RURAL RD", "E LEMON ST & S RURAL RD"]}, {"id": "Q2", "title": "Yellow and all-red clearance intervals", "question": "Why were yellow and all-red clearance intervals added to traffic signals, and what safety problem is the yellow interval intended to reduce?", "draft_answer": "Yellow and all-red intervals were added to make phase transitions safer. The yellow interval warns drivers that green is ending and helps reduce the dilemma-zone problem, where a driver may be too close to stop comfortably but may not clear safely before red. The all-red interval gives vehicles already in the intersection a short clearance time before conflicting traffic receives green.", "dashboard_panels": ["phase_yellow_red_table", "intersection_image", "approach_context"], "student_task": "List the phase with the longest yellow value and explain whether approach speed, crossing width, or turning geometry could justify the difference.", "example_intersections": ["E RIO SALADO PKY & S RURAL RD", "E UNIVERSITY DR & S MILL AVE"]}, {"id": "Q3", "title": "Pedestrian clearance and walk distance", "question": "The slide deck says pedestrian clearance time depends on walk distance. Why can different definitions of walk distance change the shortest possible cycle length at an intersection?", "draft_answer": "Pedestrian clearance time is calculated from crossing distance and assumed walking speed. If the measured walk distance changes, the required clearance time also changes. A longer crossing distance requires a longer walk-plus-clearance interval, which can increase the minimum feasible cycle length and reduce flexibility for vehicle green splits.", "dashboard_panels": ["satellite_view", "phase_splits", "special_phase_check"], "student_task": "Use satellite view to identify the likely longest crossing. Explain how longer pedestrian clearance can constrain green splits.", "example_intersections": ["METRO LIGHT RAIL & UNIVERSITY & RURAL STATION", "E UNIVERSITY DR & S RURAL RD"]}, {"id": "Q4", "title": "Preemption vs. priority", "question": "Compare preemption and priority. Who typically receives preemption, and what are two strategies that can be used under priority control?", "draft_answer": "Preemption is a stronger intervention that interrupts or overrides normal signal operation for a high-priority user. Preemption is typically given to emergency vehicles and freight trains. Priority is softer and modifies the signal plan to serve selected vehicles faster while preserving normal coordination as much as possible. Two strategies are early green and extended green.", "dashboard_panels": ["transit_priority_panel", "phase_splits", "conflicting_movement_delay"], "student_task": "Identify the likely transit movement and explain what happens to cross-street or left-turn phases if the transit phase receives green extension.", "example_intersections": ["E APACHE BLVD & S RURAL RD", "METRO LIGHT RAIL & S MILL AVE"]}, {"id": "Q5", "title": "Bike detection", "question": "Why is bike detection treated as a special issue rather than just a normal vehicle detection problem? What operational question does the presenter raise about bike-only detection?", "draft_answer": "Bike detection is special because bikes may not activate standard vehicle detectors reliably, and bike movements may need different operational treatment than cars. The presenter asks whether bikes alone should trigger a standard vehicle phase or something different. This affects delay, safety, and whether a full vehicle phase is appropriate for bike-only demand.", "dashboard_panels": ["satellite_view", "bike_facility_notes", "movement_delay"], "student_task": "Choose one approach where bike traffic is plausible and state whether bike detection should trigger the full vehicle phase, a shorter phase, or a special bike treatment.", "example_intersections": ["E UNIVERSITY DR & S MILL AVE", "E APACHE BLVD & S COLLEGE AVE"]}, {"id": "Q6", "title": "Offset and corridor progression", "question": "What is an offset in corridor progression, and how does it help improve traffic flow in the peak direction?", "draft_answer": "An offset is the time shift between an intersection signal cycle and a common corridor reference time. Offsets help a platoon released at one signal arrive at downstream signals during green. In the peak direction, good offsets reduce stops, improve progression, reduce delay, and support smoother corridor flow.", "dashboard_panels": ["corridor_offset_comparison", "cycle_offset_table", "map_sequence"], "student_task": "Compare the offsets along the Rio Salado corridor and explain why coordinated intersections should not all start green at the same clock time.", "example_intersections": ["S PACKARD DR & E RIO SALADO PKY", "HAYDEN FERRY LAKESIDE & E RIO SALADO PKY", "E RIO SALADO PKY & S RURAL RD"]}, {"id": "Q7", "title": "Adaptive signal technology", "question": "According to the deck, what does adaptive signal technology monitor, and which three signal settings can it adjust from cycle to cycle?", "draft_answer": "Adaptive signal technology monitors phase utilization and percent arrival on green. It can adjust cycle length, offset, and green split time from cycle to cycle. The operational goal is to respond to changing demand instead of relying only on fixed time-of-day timing plans.", "dashboard_panels": ["busiest_vs_highest_delay", "phase_splits", "adaptive_decision_prompt"], "student_task": "Compare the busiest movement and the highest-delay movement. Decide whether adaptive control should prioritize volume, delay, arrivals on green, or a combination.", "example_intersections": ["E RIO SALADO PKY & S RURAL RD", "E UNIVERSITY DR & S RURAL RD"]}, {"id": "Q8", "title": "What makes Tempe special?", "question": "Tempe is described as special because of several local conditions. Name three of them, and explain how one of them could make signal operations more difficult.", "draft_answer": "Three local conditions are light rail/streetcar, bike facilities, and high pedestrian volume. Other examples include adaptive signals and special events. High pedestrian volume can make signal operations more difficult because pedestrian walk and clearance times may require longer phases, reducing flexibility for vehicle green time. Light rail or streetcar activity can also require priority, special phases, or green extension.", "dashboard_panels": ["multimodal_context", "special_phases", "movement_summary"], "student_task": "Classify the selected intersection as vehicle-dominant, pedestrian-sensitive, bike-sensitive, transit-sensitive, or special-event-sensitive. Justify the label using at least one dashboard field.", "example_intersections": ["METRO LIGHT RAIL & UNIVERSITY & RURAL STATION", "E APACHE BLVD & S RURAL RD", "E UNIVERSITY DR & S MILL AVE"]}, {"id": "Q9", "title": "Transit signal priority parameters", "question": "For transit signal priority, what is the role of each of these parameters: parent phase, advance call, advance green, and extend?", "draft_answer": "Parent phase identifies the signal phase associated with the transit or streetcar movement. Advance call is the estimated time between when the controller receives the transit call and when the transit vehicle is expected to arrive. Advance green is the amount of time the controller may start green early. Extend is the amount of extra green time allowed so the transit vehicle can clear the intersection before the phase ends.", "dashboard_panels": ["transit_priority_timeline", "phase_splits", "special_phase_check"], "student_task": "Draw a timeline: call received -> advance-call travel time -> possible advance green -> possible green extension -> streetcar clears intersection.", "example_intersections": ["E APACHE BLVD & S RURAL RD", "METRO LIGHT RAIL & S MILL AVE"]}, {"id": "Q10", "title": "Why Tempe timing needs flexibility", "question": "Suppose a corridor has light rail or streetcar activity, heavy pedestrian demand, and special events. Based on the slide deck, why would signal timing in Tempe need to be more flexible than in a standard suburban corridor?", "draft_answer": "A standard suburban corridor often focuses mainly on vehicle progression and recurring peak demand. Tempe needs flexible timing because the same corridor must serve light rail or streetcar priority, high pedestrian crossing demand, bikes, special-event closures, and adaptive signal operation. These conditions create competing constraints, so timing must be multimodal, context-sensitive, and capable of time-of-day or cycle-by-cycle adjustment.", "dashboard_panels": ["multimodal_context", "busiest_vs_highest_delay", "special_event_prompt"], "student_task": "Choose one intersection and write which timing feature is most important: split adjustment, offset adjustment, special phase, detection, or priority.", "example_inte <script>
const PHASE_COLORS = ['#1d4ed8','#059669','#d97706','#7c3aed','#db2777','#0891b2','#65a30d','#dc2626'];
const APPROACH_COLORS = { N:'#1d4ed8', S:'#059669', E:'#d97706', W:'#7c3aed' };

const byName = Object.fromEntries(PAYLOAD.intersections.map(d => [d.name, d]));
const tabsEl = document.getElementById('qtabs');
const answerEl = document.getElementById('answer');
const gridEl = document.getElementById('grid');
let current = PAYLOAD.questions[0].id;
const mapInstances = {};

function fmt(x, d=1) {
  if (x === null || x === undefined || x === '') return 'n/a';
  const n = typeof x === 'number' ? x : parseFloat(x);
  return isNaN(n) ? x : n.toFixed(d);
}
function asNum(x) {
  if (x === null || x === undefined || x === '') return null;
  const n = typeof x === 'number' ? x : parseFloat(x);
  return isNaN(n) ? null : n;
}
function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTabs() {
  tabsEl.innerHTML = PAYLOAD.questions.map(q =>
    `<button class="qtab ${q.id===current?'active':''}" data-q="${q.id}"><span class="qid">${q.id}</span>${escHtml(q.title)}</button>`
  ).join('');
  tabsEl.querySelectorAll('.qtab').forEach(b => b.addEventListener('click', () => {
    current = b.dataset.q;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }));
}

function renderAnswer(q) {
  answerEl.innerHTML = `
    <div class="qcard">
      <h2>${escHtml(q.id)}. ${escHtml(q.title)}</h2>
      <p class="qsub"><b>Question:</b> ${escHtml(q.question)}</p>
      <h3>Draft student answer</h3>
      <p>${escHtml(q.draft_answer)}</p>
      <h3>Dashboard panels to use</h3>
      <div class="badges">${(q.dashboard_panels||[]).map(p => `<span class="badge">${escHtml(p.replaceAll('_',' '))}</span>`).join('')}</div>
      <h3>Student task</h3>
      <div class="task">${escHtml(q.student_task)}</div>
    </div>`;
}

function timingPills(t) {
  const pills = [];
  if (t.corridor) pills.push(`<span class="pill corridor">${escHtml(t.corridor)}</span>`);
  if (t.ctrl) pills.push(`<span class="pill ctrl">${escHtml(t.ctrl)}</span>`);
  if (t.nid) pills.push(`<span class="pill">node ${escHtml(t.nid)}</span>`);
  return pills.join('');
}

function buildSplitBar(t) {
  const phases = t.phases || [];
  const splits = (t.split || []).map(asNum);
  const yellows = (t.yellow || []).map(asNum);
  const reds = (t.red_clear || []).map(asNum);
  const cycle = asNum(t.cycle);
  if (!phases.length || !cycle) return '<div class="empty">No phase timing available.</div>';
  const total = splits.reduce((a,b) => a + (b||0), 0) || cycle;

  const segs = phases.map((p,i) => {
    const sp = splits[i] || 0;
    const w = (sp / total) * 100;
    const c = PHASE_COLORS[i % PHASE_COLORS.length];
    const tip = `Φ${p}: split ${sp}s, yellow ${yellows[i]||0}s, red-clear ${reds[i]||0}s`;
    return `<div class="tseg" style="width:${w}%; background:${c}" title="${escHtml(tip)}">
      <span class="ph">Φ${escHtml(p)}</span><span class="sp">${sp}s</span></div>`;
  }).join('');

  const ySegs = phases.map((p,i) => {
    const sp = splits[i] || 0;
    const w = (sp / total) * 100;
    const yv = yellows[i] || 0;
    return `<div class="tseg" style="width:${w}%; background:${yv ? '#facc15' : '#f3f4f6'}; color:#1f2937" title="Yellow ${yv}s">${yv ? yv+'y' : ''}</div>`;
  }).join('');
  const rSegs = phases.map((p,i) => {
    const sp = splits[i] || 0;
    const w = (sp / total) * 100;
    const rv = reds[i] || 0;
    return `<div class="tseg" style="width:${w}%; background:${rv ? '#b91c1c' : '#f3f4f6'}" title="Red-clear ${rv}s">${rv ? rv+'r' : ''}</div>`;
  }).join('');

  return `
    <div class="tband">
      <div class="tlabel">Cycle ${cycle}s · phase splits</div>
      <div class="tbar">${segs}</div>
      <div class="tbar thin">${ySegs}</div>
      <div class="tbar thin">${rSegs}</div>
      <div class="tlegend">
        <span><i style="background:#1d4ed8"></i>green split</span>
        <span><i style="background:#facc15"></i>yellow</span>
        <span><i style="background:#b91c1c"></i>red-clear</span>
      </div>
    </div>`;
}

function approachColor(mv) {
  if (!mv) return '#6b7280';
  return APPROACH_COLORS[mv.charAt(0)] || '#6b7280';
}

function movementChips(m) {
  const moves = (m.movements || []).slice()
    .sort((a,b) => (b.journeys||0) - (a.journeys||0))
    .slice(0, 4);
  if (!moves.length) return '';
  const chips = moves.map(r => {
    const c = approachColor(r.mv);
    return `<span class="chip"><span class="dot" style="background:${c}">${escHtml((r.mv||'').slice(0,2))}</span>
      <span class="mvc">${escHtml(r.mv||'?')}</span>
      <span class="mvd">${r.journeys||0}j · ${fmt(r.mean_delay_s,1)}s</span></span>`;
  }).join('');
  return `<div class="movements"><div class="mtitle">Top movements (by journeys)</div><div class="chips">${chips}</div></div>`;
}

function callout(m) {
  if (!m || (!m.busiest_movement && !m.highest_delay_movement)) return '';
  const fmtMv = (mv) => mv ? `<span class="mv">${escHtml(mv.mv||'?')}</span> · ${mv.journeys||0} journeys · ${fmt(mv.mean_delay_s,2)} s` : 'n/a';
  return `
    <div class="callout">
      <div class="cobox">
        <div class="lab">Busiest movement</div>
        <div class="val">${fmtMv(m.busiest_movement)}</div>
      </div>
      <div class="cobox">
        <div class="lab">Highest-delay movement</div>
        <div class="val">${fmtMv(m.highest_delay_movement)}</div>
      </div>
    </div>`;
}

function intersectionCard(name, idx) {
  const d = byName[name];
  if (!d || !d.timing) {
    return `<div class="icard"><h3 class="iname">${escHtml(name)}</h3>
      <div class="empty">No data joined for this intersection.</div></div>`;
  }
  const t = d.timing;
  const m = d.movement_summary || {};
  const mapId = `map_${current}_${idx}`;
  const lat = asNum(t.lat), lon = asNum(t.lon);
  const coords = (lat !== null && lon !== null)
    ? `${lat.toFixed(5)}, ${lon.toFixed(5)}`
    : 'no coordinates';
  return `<div class="icard">
    <h3 class="iname">${escHtml(name)}</h3>
    <div class="pills">${timingPills(t)}</div>
    <div class="satwrap">
      <div class="satmap" id="${mapId}"></div>
      <div class="satlabel">${escHtml(coords)}</div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="v">${fmt(t.cycle,0)}s</div><div class="l">Cycle</div></div>
      <div class="metric"><div class="v">${fmt(t.offset,0)}s</div><div class="l">Offset</div></div>
      <div class="metric"><div class="v">${m.total_journeys ?? 'n/a'}</div><div class="l">Journeys</div></div>
      <div class="metric"><div class="v">${fmt(m.weighted_mean_delay_s,1)}</div><div class="l">Wt delay (s)</div></div>
    </div>
    ${buildSplitBar(t)}
    ${movementChips(m)}
    ${callout(m)}
  </div>`;
}

function attachMap(name, idx) {
  const d = byName[name];
  if (!d || !d.timing) return;
  const lat = asNum(d.timing.lat), lon = asNum(d.timing.lon);
  if (lat === null || lon === null) return;
  const mapId = `map_${current}_${idx}`;
  const el = document.getElementById(mapId);
  if (!el) return;
  if (mapInstances[mapId]) { mapInstances[mapId].remove(); }
  const map = L.map(el, {
    zoomControl:false, attributionControl:false,
    dragging:true, scrollWheelZoom:false, touchZoom:false,
    doubleClickZoom:true, boxZoom:false, keyboard:false,
  }).setView([lat, lon], 18);
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom:20, attribution:'Imagery © Esri' }
  ).addTo(map);
  L.circleMarker([lat, lon], {
    radius:9, color:'#FFC627', weight:3, fillColor:'#8C1D40', fillOpacity:.85
  }).addTo(map);
  mapInstances[mapId] = map;
}

function renderGrid(q) {
  const list = q.example_intersections || [];
  gridEl.innerHTML = list.map((n,i) => intersectionCard(n,i)).join('');
  list.forEach((n,i) => attachMap(n,i));
}

function render() {
  const q = PAYLOAD.questions.find(x => x.id === current) || PAYLOAD.questions[0];
  Object.values(mapInstances).forEach(m => m.remove());
  Object.keys(mapInstances).forEach(k => delete mapInstances[k]);
  renderTabs();
  renderAnswer(q);
  renderGrid(q);
}

render();
</script>
</body>
</html>
