<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tempe Integrated Transit & Signal Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080b11;--p1:#0e1219;--p2:#151b26;--p3:#1c2333;--bd:#252d3a;--tx:#d0d8e8;--dm:#5a6a82;--wh:#f0f4fa;--bl:#4da3ff;--bl2:#2b7de9;--bll:rgba(77,163,255,.08);--gn:#3ddc84;--gnl:rgba(61,220,132,.08);--rd:#f85149;--rdl:rgba(248,81,73,.08);--yl:#e3b341;--yll:rgba(227,179,65,.08);--or:#ff8c42;--orl:rgba(255,140,66,.08);--pp:#b68cff;--ppl:rgba(182,140,255,.08);--cy:#56d4dd;--cyl:rgba(86,212,221,.08);--mg:#ff6b9d;--r:6px;--r2:10px}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px}
.hdr{height:42px;background:linear-gradient(180deg,#121820,var(--p1));border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px}
.logo{display:flex;align-items:center;gap:7px}
.logo-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--bl),var(--gn));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;flex-shrink:0}
.logo b{font-size:11px;color:var(--wh)}.logo small{font-size:8px;color:var(--dm);margin-left:3px}
.sep{width:1px;height:22px;background:var(--bd)}
.lyr-bar{display:flex;gap:2px;flex-wrap:wrap}
.lb{padding:3px 8px;font-size:8px;font-weight:600;background:var(--p2);border:1px solid var(--bd);border-radius:4px;color:var(--dm);cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.lb:hover{color:var(--tx)}.lb.on{border-color:var(--bl);color:var(--bl);background:var(--bll)}
.lb .d{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tile-sw{display:flex;gap:2px;margin-left:auto}
.tb{padding:3px 7px;font-size:8px;background:var(--p2);border:1px solid var(--bd);border-radius:3px;color:var(--dm);cursor:pointer;font-family:inherit}.tb:hover{color:var(--tx)}.tb.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.main{display:flex;height:calc(100vh - 42px)}
.mc{flex:1;position:relative}
#map{width:100%;height:100%}
.sd{width:400px;background:var(--p1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.st{display:flex;background:var(--bg);border-bottom:1px solid var(--bd);padding:3px 5px;gap:1px;overflow-x:auto}
.stb{padding:4px 9px;font-size:8px;font-weight:600;color:var(--dm);cursor:pointer;border-radius:4px;transition:all .12s;letter-spacing:.2px;white-space:nowrap}
.stb:hover{color:var(--tx);background:rgba(77,163,255,.04)}.stb.on{color:var(--bl);background:var(--p2);border:1px solid var(--bd)}
.sc{overflow-y:auto;flex:1;padding:8px}
.cd{background:var(--p2);border:1px solid rgba(37,45,58,.6);border-radius:var(--r2);padding:10px 12px;margin-bottom:8px}
.cd h3{font-size:8px;color:var(--bl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;font-weight:700;display:flex;align-items:center;gap:5px}
.cd h3 .i{font-size:11px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(37,45,58,.3)}.sr:last-child{border:none}
.sl{color:var(--dm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}.sv{font-weight:600;font-family:'JetBrains Mono',mono;font-size:10px;flex-shrink:0;margin-left:6px}
.sv.bl{color:var(--bl)}.sv.gn{color:var(--gn)}.sv.rd{color:var(--rd)}.sv.yl{color:var(--yl)}.sv.or{color:var(--or)}.sv.pp{color:var(--pp)}.sv.cy{color:var(--cy)}
.bg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;font-family:'JetBrains Mono',mono}
.bg-b{background:var(--bll);color:var(--bl)}.bg-g{background:var(--gnl);color:var(--gn)}.bg-r{background:var(--rdl);color:var(--rd)}.bg-y{background:var(--yll);color:var(--yl)}.bg-o{background:var(--orl);color:var(--or)}.bg-p{background:var(--ppl);color:var(--pp)}.bg-c{background:var(--cyl);color:var(--cy)}
.kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin:6px 0}
.kpi-b{text-align:center;padding:8px 4px;border-radius:var(--r);border:1px solid rgba(37,45,58,.5);background:rgba(10,14,20,.4)}
.kpi-n{font-size:20px;font-weight:700;font-family:'JetBrains Mono',mono}.kpi-l{font-size:7px;color:var(--dm);margin-top:2px}
.kpi4{grid-template-columns:1fr 1fr 1fr 1fr}
.nr{display:flex;gap:2px;margin:3px 0}
.np{flex:1;text-align:center;padding:4px 2px;border-radius:5px;font-size:8px;font-family:'JetBrains Mono',mono;font-weight:600;line-height:1.2}
.np.r1{background:rgba(77,163,255,.06);color:var(--bl);border:1.5px solid rgba(77,163,255,.15)}
.np.r2{background:var(--ppl);color:var(--pp);border:1.5px solid rgba(182,140,255,.15)}
.np.act{background:var(--gnl)!important;border-color:var(--gn)!important;color:var(--gn)!important;font-weight:800}
.nb{width:3px;background:var(--yl);border-radius:2px}
.ph-bar{display:flex;gap:2px;margin:5px 0;flex-wrap:wrap}
.ph-d{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'JetBrains Mono',mono;font-weight:700;border:2px solid var(--bd)}
.ph-d.on{border-color:var(--gn);background:var(--gnl);color:var(--gn)}.ph-d.off{opacity:.3;color:var(--dm)}
.tbar{display:flex;gap:1px;height:20px;border-radius:4px;overflow:hidden;margin:4px 0;background:rgba(37,45,58,.3)}
.tg{background:var(--gn);color:#000;font-size:6px;font-family:'JetBrains Mono',mono;font-weight:700;display:flex;align-items:center;justify-content:center}
.ty{background:#eab308;font-size:6px;display:flex;align-items:center;justify-content:center}
.dt{width:100%;border-collapse:collapse;font-size:9px}
.dt th{text-align:left;padding:3px 5px;background:rgba(10,14,20,.5);color:var(--dm);border-bottom:1px solid var(--bd);font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.dt td{padding:2px 5px;border-bottom:1px solid rgba(37,45,58,.3);font-family:'JetBrains Mono',mono;font-size:9px}
.dt tr:hover td{background:rgba(77,163,255,.03)}
.dt tr{cursor:pointer}
.sig,.ri{padding:6px 8px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .1s}
.sig:hover,.ri:hover{border-color:var(--bl);background:var(--bll)}
.sig.on,.ri.on{border-color:var(--bl);background:var(--bll);box-shadow:inset 3px 0 0 var(--bl)}
.sig-nm,.ri-nm{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--wh)}
.sig-sub,.ri-sub{font-size:8px;color:var(--dm);margin-top:1px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.cb{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:6px}
.cbtn{padding:2px 7px;font-size:7px;font-weight:600;background:var(--p2);border:1px solid var(--bd);border-radius:3px;color:var(--dm);cursor:pointer;font-family:inherit}.cbtn:hover{color:var(--tx)}.cbtn.on{color:var(--bl);border-color:var(--bl);background:var(--bll)}
.nt{font-size:9px;padding:5px 7px;border-radius:5px;border-left:3px solid;margin:5px 0;line-height:1.5}
.nt-y{color:var(--yl);background:var(--yll);border-color:var(--yl)}.nt-b{color:var(--bl);background:var(--bll);border-color:var(--bl)}.nt-g{color:var(--gn);background:var(--gnl);border-color:var(--gn)}.nt-r{color:var(--rd);background:var(--rdl);border-color:var(--rd)}
.search{width:100%;padding:5px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:inherit;font-size:10px;margin-bottom:6px;outline:none}.search:focus{border-color:var(--bl)}.search::placeholder{color:var(--dm)}
.prox-item{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(37,45,58,.3);font-size:9px;cursor:pointer}
.prox-item:hover{background:var(--bll);margin:0 -4px;padding:4px 4px;border-radius:4px}
.prox-icon{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.prox-dist{font-family:'JetBrains Mono',mono;font-size:8px;color:var(--dm);margin-left:auto}
.legend{position:absolute;bottom:10px;left:8px;background:rgba(14,18,25,.94);border:1px solid var(--bd);border-radius:var(--r2);padding:8px 12px;z-index:800;font-size:7px;backdrop-filter:blur(8px);max-width:180px}
.legend h4{font-size:6px;color:var(--dm);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 2px}.legend h4:first-child{margin-top:0}
.li{display:flex;align-items:center;gap:4px;margin:1px 0;font-size:7px;color:var(--tx)}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}.ll{width:12px;height:3px;border-radius:1px;flex-shrink:0}
.tt{background:rgba(14,18,25,.95)!important;color:var(--tx)!important;border:1px solid var(--bd)!important;border-radius:5px!important;font-size:9px!important;padding:3px 6px!important;font-family:'DM Sans',sans-serif!important;box-shadow:0 4px 12px rgba(0,0,0,.4)!important}
.sc::-webkit-scrollbar{width:4px}.sc::-webkit-scrollbar-track{background:transparent}.sc::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.freq-bar{display:flex;gap:1px;margin:3px 0;height:28px;align-items:flex-end}
.freq-col{flex:1;border-radius:2px 2px 0 0;min-width:4px;position:relative;transition:all .1s}
.freq-col:hover{opacity:.8}
.hs-tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:7px;margin:1px;background:rgba(37,45,58,.5);color:var(--dm)}
.route-color{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
</style></head><body>
<div class="hdr">
  <div class="logo"><div class="logo-icon">T+</div><div><b>Tempe Integrated</b><small>Transit × Signals · GTFS + Signal Timing</small></div></div>
  <div class="sep"></div>
  <div class="lyr-bar">
    <button class="lb on" id="lyr-sig" onclick="tgl('sig')"><span class="d" style="background:var(--yl)"></span>Signals</button>
    <button class="lb on" id="lyr-rail" onclick="tgl('rail')"><span class="d" style="background:var(--rd)"></span>Rail</button>
    <button class="lb on" id="lyr-bus" onclick="tgl('bus')"><span class="d" style="background:var(--pp)"></span>Bus</button>
    <button class="lb" id="lyr-circ" onclick="tgl('circ')"><span class="d" style="background:var(--cy)"></span>Circulators</button>
    <button class="lb" id="lyr-exp" onclick="tgl('exp')"><span class="d" style="background:var(--or)"></span>Express</button>
    <button class="lb" id="lyr-stops" onclick="tgl('stops')"><span class="d" style="background:var(--gn)"></span>All Stops</button>
  </div>
  <div class="tile-sw">
    <button class="tb" id="td" onclick="setT('dark')">Dark</button>
    <button class="tb on" id="to" onclick="setT('osm')">Street</button>
    <button class="tb" id="ts" onclick="setT('sat')">Sat</button>
  </div>
</div>
<div class="main">
  <div class="mc"><div id="map"></div>
    <div class="legend">
      <h4>Traffic Signals (206)</h4>
      <div class="li"><div class="ld" style="background:#3ddc84"></div>2-phase</div>
      <div class="li"><div class="ld" style="background:#4da3ff"></div>4-phase</div>
      <div class="li"><div class="ld" style="background:#e3b341"></div>6-phase</div>
      <div class="li"><div class="ld" style="background:#f85149"></div>8+ phase</div>
      <h4>Transit (117 routes)</h4>
      <div class="li"><div class="ll" style="background:#e74c3c"></div>Light Rail / Streetcar</div>
      <div class="li"><div class="ll" style="background:#b68cff"></div>Local Bus</div>
      <div class="li"><div class="ll" style="background:#56d4dd;border-style:dashed"></div>Circulator / Orbit</div>
      <div class="li"><div class="ll" style="background:#ff8c42"></div>Express / RAPID</div>
      <div class="li"><div class="ld" style="background:#3ddc84"></div>Stop (8,029 total)</div>
    </div>
  </div>
  <div class="sd"><div class="st">
    <div class="stb on" onclick="sp('ov')" id="pt-ov">Overview</div>
    <div class="stb" onclick="sp('routes')" id="pt-routes">Routes</div>
    <div class="stb" onclick="sp('stops')" id="pt-stops">Stops</div>
    <div class="stb" onclick="sp('freq')" id="pt-freq">Frequency</div>
    <div class="stb" onclick="sp('sig')" id="pt-sig">Signals</div>
    <div class="stb" onclick="sp('svc')" id="pt-svc">Service</div>
    <div class="stb" onclick="sp('det')" id="pt-det">Detail</div>
  </div><div class="sc" id="pnl"></div></div>
</div>

// Transit routes on map
const routeLines={};// Store references for highlighting
const hlLayer=L.layerGroup().addTo(map);// Highlight overlay layer (always on top)
const hlStopsLayer=L.layerGroup().addTo(map);// Highlighted route stops

for(const[rid,pts]of Object.entries(SHAPES)){
  if(!pts||pts.length<2)continue;
  const cat=RCAT[rid]||'local';
  let layer,color=RC_COLORS[cat],w=2.5,op=.6,dash=null;
  if(cat==='rail'){w=4;op=.85}
  else if(cat==='circulator'){dash='5,4';w=2;op=.5}
  else if(cat==='express'){w=3;op=.55}
  else{w=2;op=.4}
  const rname=RT[rid]?`${RT[rid].s} - ${RT[rid].l}`:'';
  const line=L.polyline(pts,{color,weight:w,opacity:op,dashArray:dash,_rid:rid,_origW:w,_origOp:op});
  line.bindTooltip(`<b>${rname}</b><br>${RC_LABELS[cat]} · ${RS[rid]?RS[rid].trips:0} trips`,{className:'tt',sticky:true});
  line.on('click',()=>{selRt=rid;selSig=null;selSta=null;sp('det');rp()});
  if(cat==='rail')line.addTo(LY.rail);
  else if(cat==='circulator')line.addTo(LY.circ);
  else if(cat==='express')line.addTo(LY.exp);
  else line.addTo(LY.bus);
  routeLines[rid]=line;
}

// Highlight selected route: add bold overlay + dim others
function highlightRoute(rid){
  hlLayer.clearLayers();
  hlStopsLayer.clearLayers();
  if(!rid||!SHAPES[rid]){
    // Restore all route opacities
    for(const[id,line]of Object.entries(routeLines)){
      line.setStyle({weight:line.options._origW,opacity:line.options._origOp});
    }
    return;
  }
  // Dim all other routes
  for(const[id,line]of Object.entries(routeLines)){
    if(id===rid){line.setStyle({opacity:0.15,weight:line.options._origW})}
    else{line.setStyle({opacity:0.06,weight:1})}
  }
  const cat=RCAT[rid]||'local';
  const clr=RC_COLORS[cat];
  const pts=SHAPES[rid];
  // Glow/halo layer
  L.polyline(pts,{color:'#fff',weight:10,opacity:0.08,lineCap:'round',lineJoin:'round'}).addTo(hlLayer);
  // Bold highlighted line
  L.polyline(pts,{color:clr,weight:6,opacity:1,lineCap:'round',lineJoin:'round'}).addTo(hlLayer);
  // Inner bright core
  L.polyline(pts,{color:'#fff',weight:1.5,opacity:0.4,lineCap:'round',lineJoin:'round'}).addTo(hlLayer);
  // Add route stops as markers
  const stSet=new Set();
  const step=Math.max(1,Math.floor(pts.length/25));
  for(let i=0;i<pts.length;i+=step){
    for(const[sid,s]of Object.entries(STOPS)){
      if(stSet.has(sid))continue;
      const d=dist([pts[i][0],pts[i][1]],[s[1],s[2]]);
      if(d<150){
        stSet.add(sid);
        L.circleMarker([s[1],s[2]],{radius:4,fillColor:clr,color:'#fff',weight:1.5,fillOpacity:0.9})
          .bindTooltip(`<b>${s[0]}</b><br>ID:${sid}`,{className:'tt'})
          .addTo(hlStopsLayer);
      }
    }
  }
  // Start/end markers
  if(pts.length>1){
    L.circleMarker(pts[0],{radius:7,fillColor:'#3ddc84',color:'#fff',weight:2,fillOpacity:1})
      .bindTooltip('Route Start',{className:'tt',permanent:false}).addTo(hlLayer);
    L.circleMarker(pts[pts.length-1],{radius:7,fillColor:'#f85149',color:'#fff',weight:2,fillOpacity:1})
      .bindTooltip('Route End',{className:'tt',permanent:false}).addTo(hlLayer);
  }
}

// Clear highlight when deselecting
function clearHighlight(){
  hlLayer.clearLayers();
  hlStopsLayer.clearLayers();
  for(const[id,line]of Object.entries(routeLines)){
    line.setStyle({weight:line.options._origW,opacity:line.options._origOp});
  }
}

// Highlight a selected stop: big marker + nearby stops + nearby signals + serving routes
function highlightStop(sid,sdata){
  hlLayer.clearLayers();hlStopsLayer.clearLayers();
  if(!sid||!sdata)return;
  const lat=sdata[1],lon=sdata[2];
  for(const[id,line]of Object.entries(routeLines)){line.setStyle({opacity:0.06,weight:1})}
  // Selected stop - big marker
  L.circleMarker([lat,lon],{radius:14,fillColor:'#4da3ff',color:'#fff',weight:3,fillOpacity:0.15}).addTo(hlLayer);
  L.circleMarker([lat,lon],{radius:8,fillColor:'#4da3ff',color:'#fff',weight:2,fillOpacity:0.9}).addTo(hlLayer);
  // Nearby stops
  nearStops(lat,lon,300).filter(n=>n.id!==sid).forEach(n=>{
    const ns=STOPS[n.id];if(!ns)return;
    L.circleMarker([ns[1],ns[2]],{radius:4,fillColor:'#3ddc84',color:'#fff',weight:1,fillOpacity:0.8})
      .bindTooltip(`<b>${ns[0]}</b><br>${fd(n.dist)}`,{className:'tt'}).addTo(hlStopsLayer);
  });
  // Nearby signals
  nearSigs(lat,lon,500).forEach(n=>{
    const sg=SIG[n.idx];if(!sg)return;
    L.circleMarker([sg.lat,sg.lon],{radius:6,fillColor:PC(sg.n_phases),color:'#fff',weight:2,fillOpacity:0.9})
      .bindTooltip(`<b>${sg.name}</b><br>${sg.n_phases}-ph · ${fd(n.dist)}`,{className:'tt'}).addTo(hlLayer);
  });
  // Highlight serving routes
  for(const[rid,pts]of Object.entries(SHAPES)){
    if(!pts)continue;let minD=Infinity;
    for(let i=0;i<pts.length;i+=Math.max(1,Math.floor(pts.length/30))){const d=dist([lat,lon],pts[i]);if(d<minD)minD=d}
    if(minD<150){
      L.polyline(pts,{color:RC_COLORS[RCAT[rid]||'local'],weight:4,opacity:0.85,lineCap:'round'}).addTo(hlLayer);
      if(routeLines[rid])routeLines[rid].setStyle({opacity:0,weight:0});
    }
  }
}

// Highlight a selected signal: big marker + nearby transit + nearby signals + nearby routes
function highlightSignal(idx){
  hlLayer.clearLayers();hlStopsLayer.clearLayers();
  const s=SIG[idx];if(!s||!s.lat)return;
  for(const[id,line]of Object.entries(routeLines)){line.setStyle({opacity:0.06,weight:1})}
  // Selected signal - big marker
  L.circleMarker([s.lat,s.lon],{radius:16,fillColor:PC(s.n_phases),color:'#fff',weight:3,fillOpacity:0.12}).addTo(hlLayer);
  L.circleMarker([s.lat,s.lon],{radius:9,fillColor:PC(s.n_phases),color:'#fff',weight:2.5,fillOpacity:0.9}).addTo(hlLayer);
  // Nearby stops
  nearStops(s.lat,s.lon,600).slice(0,15).forEach(n=>{
    const ns=STOPS[n.id];if(!ns)return;
    L.circleMarker([ns[1],ns[2]],{radius:5,fillColor:'#3ddc84',color:'#fff',weight:1.5,fillOpacity:0.85})
      .bindTooltip(`<b>${ns[0]}</b><br>${fd(n.dist)}`,{className:'tt'}).addTo(hlStopsLayer);
  });

  nearSigs(s.lat,s.lon,400).filter(n=>n.idx!==idx).forEach(n=>{
    const sg=SIG[n.idx];

      .bindTooltip(`<b>${sg.name}</b><br>${sg.n_phases}-ph · ${fd(n.dist)}`,{className:'tt'}).addTo(hlLayer);
  });
  // Nearby routes
  for(const[rid,pts]of Object.entries(SHAPES)){
    if(!pts)continue;let minD=Infinity;

    if(minD<300){

    }
  }
}

// All stops layer (loaded on demand)
let stopsLoaded=false;
function loadStops(){
  if(stopsLoaded)return;
  let count=0;
  for(const[sid,s]of Object.entries(STOPS)){

  }

// ===== UTILS =====
function dist(a,b){const R=6371e3,f1=a[0]*Math.PI/180,f2=b[0]*Math.PI/180,df=(b[0]-a[0])*Math.PI/180,dl=(b[1]-a[1])*Math.PI/180;const x=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function fd(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km'}
function nearStops(lat,lon,r=500){const res=[];for(const[sid,s]of Object.entries(STOPS)){const d=dist([lat,lon],[s[1],s[2]]);if(d<=r)res.push({id:sid,name:s[0],dist:d,jur:s[3]})}return res.sort((a,b)=>a.dist-b.dist)}
function nearSigs(lat,lon,r=500){const res=[];SIG.forEach((s,i)=>{if(!s.lat)return;const d=dist([lat,lon],[s.lat,s.lon]);if(d<=r)res.push({idx:i,name:s.name,dist:d,n:s.n_phases,c:s.cycle})});return res.sort((a,b)=>a.dist-b.dist)}

}

    ${list.map((s)=>{const gi=SIG.indexOf(s);return `<div class="sig${selSig===gi?' on':''}" onclick="selSig=${gi};selSta=null;selRt=null;sp('det');rp();map.setView([${s.lat},${s.lon}],17)">

      <div class="sig-sub"><span class="bg" style="background:${PC(s.n_phases)}20;color:${PC(s.n_phases)}">${s.n_phases}ph</span><span style="font-family:'JetBrains Mono';font-size:8px">${s.cycle||'?'}s</span><span style="font-size:7px">${s.corridor.replace('_',' ')}</span><span style="font-size:7px">${s.ctrl||''}</span></div>
    </div>`}).join('')}`;
}

      <table class="dt"><tr><th>Service ID</th><th>Type</th><th># Dates</th></tr>
      ${Object.entries(SVC).sort((a,b)=>b[1].dates-a[1].dates).slice(0,20).map(([sid,s])=>`<tr><td style="font-size:7px;word-break:break-all;font-family:'DM Sans'">${sid}</td><td><span class="bg ${s.type==='Weekday'?'bg-b':s.type==='Saturday'?'bg-o':'bg-p'}">${s.type}</span></td><td class="sv bl">${s.dates}</td></tr>`).join('')}
      </table>
    </div>
    <div class="cd"><h3><span class="i">🏢</span>Routes by Division</h3>
      ${Object.entries(divRoutes).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<div class="sr"><span class="sl">${d||'(none)'}</span><span class="sv bl">${n} routes</span></div>`).join('')}
    </div>
    <div class="cd"><h3><span class="i">🔄</span>Defined Transfers</h3>
      <table class="dt"><tr><th>From</th><th>To</th><th>Type</th><th>Min Time</th></tr>
      ${XFER.map(x=>`<tr><td>${STOPS[x.from]?STOPS[x.from][0]:x.from}</td><td>${STOPS[x.to]?STOPS[x.to][0]:x.to}</td><td>${x.type}</td><td class="sv yl">${x.time}s</td></tr>`).join('')}
      </table>
    </div>
    <div class="cd"><h3><span class="i">📐</span>NEMA 8-Phase Reference</h3>
      <div style="font-size:8px;color:var(--dm)">Ring 1</div>
      <div class="nr"><div class="np r1">Φ1<br>WBL</div><div class="np r1">Φ2<br>EBT</div><div class="nb"></div><div class="np r1">Φ3<br>NBL</div><div class="np r1">Φ4<br>SBT</div></div>
      <div style="font-size:8px;color:var(--dm);margin-top:3px">Ring 2</div>
      <div class="nr"><div class="np r2">Φ5<br>EBL</div><div class="np r2">Φ6<br>WBT</div><div class="nb"></div><div class="np r2">Φ7<br>SBL</div><div class="np r2">Φ8<br>NBT</div></div>
    </div>`;
}

function rdet(el){
  if(selRt)rrtDet(el);
  else if(selSig!==null)rsigDet(el);
  else if(selSta)rstaDet(el);
  else{clearHighlight();el.innerHTML='<div class="cd"><h3>No Selection</h3><div class="nt nt-b">Click a route, signal, or stop on the map or in any list to see full details with cross-layer analysis.</div></div>';}
}

function rrtDet(el){
  const r=RT[selRt];if(!r){el.innerHTML='<div class="cd">Route not found</div>';return}
  const s=RS[selRt]||{trips:0,d0:0,d1:0,shapes:0,hs:[],svc:0,blks:0};
  const cat=RCAT[selRt]||'local';
  const clr=RC_COLORS[cat];
  const d0=DIR[selRt+'_0']||'Direction 0';
  const d1=DIR[selRt+'_1']||'Direction 1';

  // Find nearby signals along route shape
  let routeSigs=[];
  if(SHAPES[selRt]){
    const pts=SHAPES[selRt];
    const sigSet=new Set();
    // Sample points along shape
    const step=Math.max(1,Math.floor(pts.length/20));
    for(let i=0;i<pts.length;i+=step){
      const nearby=nearSigs(pts[i][0],pts[i][1],200);
      nearby.forEach(n=>{if(!sigSet.has(n.idx)){sigSet.add(n.idx);routeSigs.push(n)}});
    }
    routeSigs.sort((a,b)=>a.dist-b.dist);
  }

  // Find stops near route
  let routeStops=[];
  if(SHAPES[selRt]){
    const pts=SHAPES[selRt];
    const stSet=new Set();
    const step=Math.max(1,Math.floor(pts.length/15));
    for(let i=0;i<pts.length;i+=step){
      const nearby=nearStops(pts[i][0],pts[i][1],150);
      nearby.forEach(n=>{if(!stSet.has(n.id)){stSet.add(n.id);routeStops.push(n)}});
    }
  }

  // Zoom to route and highlight
  highlightRoute(selRt);
  if(SHAPES[selRt]){const b=L.latLngBounds(SHAPES[selRt]);map.fitBounds(b,{padding:[60,60]})}

  el.innerHTML=`
    <div class="cd">
      <h3><span class="i">🚌</span>Route Detail</h3>
      <div style="font-size:14px;font-weight:700;color:var(--wh);margin-bottom:3px"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${clr};margin-right:6px"></span>${r.s} — ${r.l}</div>
      <div style="font-size:9px;color:var(--dm)">ID: ${selRt} · Agency: ${r.a===10?'PHX Sky Harbor':'Valley Metro'} · Division: ${r.d} · Type: ${r.t} (alt: ${r.at})</div>
      <div style="margin-top:5px;display:flex;align-items:center;gap:6px"><span class="bg" style="background:${clr}20;color:${clr};font-size:10px;padding:2px 8px">${RC_LABELS[cat]}</span><button onclick="selRt=null;clearHighlight();sp('routes')" style="margin-left:auto;padding:3px 10px;font-size:8px;background:var(--p3);border:1px solid var(--bd);border-radius:4px;color:var(--dm);cursor:pointer;font-family:inherit">✕ Clear Selection</button></div>
    </div>
    <div class="cd"><h3><span class="i">📊</span>Trip Statistics</h3>
      <div class="kpi kpi4">
        <div class="kpi-b"><div class="kpi-n" style="color:var(--bl)">${s.trips}</div><div class="kpi-l">Total Trips</div></div>
        <div class="kpi-b"><div class="kpi-n" style="color:var(--gn)">${s.d0}</div><div class="kpi-l">${d0}</div></div>
        <div class="kpi-b"><div class="kpi-n" style="color:var(--or)">${s.d1}</div><div class="kpi-l">${d1}</div></div>
        <div class="kpi-b"><div class="kpi-n" style="color:var(--pp)">${s.shapes}</div><div class="kpi-l">Shape Variants</div></div>
      </div>
      <div class="sr"><span class="sl">Service Patterns</span><span class="sv bl">${s.svc}</span></div>
      <div class="sr"><span class="sl">Block IDs</span><span class="sv">${s.blks}</span></div>
    </div>
    ${RD[selRt]?`<div class="cd"><h3><span class="i">⏱️</span>Frequency & Service</h3>
      <div class="kpi kpi4">
        <div class="kpi-b"><div class="kpi-n" style="color:var(--bl)">${RD[selRt].wd}</div><div class="kpi-l">WD Trips/Day</div></div>
        <div class="kpi-b"><div class="kpi-n" style="color:var(--or)">${RD[selRt].sat||'—'}</div><div class="kpi-l">Sat/Day</div></div>
        <div class="kpi-b"><div class="kpi-n" style="color:var(--pp)">${RD[selRt].sun||'—'}</div><div class="kpi-l">Sun/Day</div></div>
        <div class="kpi-b"><div class="kpi-n" style="color:${RD[selRt].pk_hw<=12?'var(--gn)':RD[selRt].pk_hw<=20?'var(--bl)':'var(--yl)'}">${RD[selRt].pk_hw<120?RD[selRt].pk_hw+'′':'—'}</div><div class="kpi-l">Peak Headway</div></div>
      </div>
      <table class="dt">
        <tr><td>Peak Trips/Hour</td><td style="color:var(--gn)"><b>${RD[selRt].pk_tph}</b></td></tr>
        <tr><td>Off-Peak Trips/Hour</td><td>${RD[selRt].op_tph}</td></tr>
        <tr><td>Off-Peak Headway</td><td>${RD[selRt].op_hw<120?RD[selRt].op_hw+' min':'—'}</td></tr>
        <tr><td>Weekday Services</td><td>${RD[selRt].n_wd_svc}</td></tr>
        <tr><td>Saturday Services</td><td>${RD[selRt].n_sat_svc}</td></tr>
        <tr><td>Sunday Services</td><td>${RD[selRt].n_sun_svc}</td></tr>
      </table>
      <div style="margin-top:6px;display:flex;gap:3px;align-items:center">
        <span style="font-size:8px;color:var(--dm)">Service Level:</span>
        ${RD[selRt].pk_hw<=12?'<span class="bg bg-g">High Frequency</span>':RD[selRt].pk_hw<=20?'<span class="bg bg-b">Standard</span>':RD[selRt].pk_hw<=30?'<span class="bg bg-y">Basic</span>':'<span class="bg bg-r">Limited</span>'}
        ${RD[selRt].sat>0&&RD[selRt].sun>0?'<span class="bg bg-c">7-Day</span>':RD[selRt].sat>0?'<span class="bg bg-o">WD+Sat</span>':'<span class="bg" style="background:rgba(90,106,130,.15);color:var(--dm)">WD Only</span>'}
      </div>
    </div>`:''}
    <div class="cd"><h3><span class="i">🏷️</span>Headsigns</h3>
      <div style="display:flex;flex-wrap:wrap;gap:2px">${s.hs.map(h=>`<span class="hs-tag">${h}</span>`).join('')}</div>
    </div>
    ${routeStops.length>0?`<div class="cd"><h3><span class="i">📍</span>Nearby Stops (${routeStops.length})</h3>
      ${routeStops.slice(0,15).map(n=>`<div class="prox-item" onclick="selSta={id:'${n.id}',d:STOPS['${n.id}']};selRt=null;rp();map.setView([STOPS['${n.id}'][1],STOPS['${n.id}'][2]],17)"><div class="prox-icon" style="background:var(--gnl);color:var(--gn)">📍</div><div><div style="font-size:9px;font-weight:600">${n.name}</div><div style="font-size:7px;color:var(--dm)">${JUR_NAMES[n.jur]||n.jur} · ID:${n.id}</div></div><div class="prox-dist">${fd(n.dist)}</div></div>`).join('')}
    </div>`:''}
    ${routeSigs.length>0?`<div class="cd"><h3><span class="i">🚦</span>Signals Along Route (${routeSigs.length})</h3>
      ${routeSigs.slice(0,12).map(n=>`<div class="prox-item" onclick="selSig=${n.idx};selRt=null;rp();map.setView([SIG[${n.idx}].lat,SIG[${n.idx}].lon],17)"><div class="prox-icon" style="background:${PC(n.n)}20;color:${PC(n.n)}">${n.n}</div><div><div style="font-size:9px;font-weight:600">${n.name}</div><div style="font-size:7px;color:var(--dm)">${n.n}-phase · ${n.c||'?'}s cycle</div></div><div class="prox-dist">${fd(n.dist)}</div></div>`).join('')}
      <div class="nt nt-g"><b>TSP Analysis:</b> ${routeSigs.length} signals within 200m of this route. Avg cycle: ${Math.round(routeSigs.reduce((a,n)=>a+(n.c||0),0)/routeSigs.filter(n=>n.c).length)}s. ${routeSigs.filter(n=>n.n>=6).length} have ≥6 phases (complex).</div>
    </div>`:''}`;
}

function rsigDet(el){
  const s=SIG[selSig];if(!s){el.innerHTML='<div class="cd">Signal not found</div>';return}
  highlightSignal(selSig);
  const phSet=new Set(s.phases);
  const plan1=s.plans['1']||s.plans[Object.keys(s.plans)[0]]||[];
  const planKey=Object.keys(s.plans)[0]||'1';
  const hasLeft=s.phases.includes(1)||s.phases.includes(3)||s.phases.includes(5)||s.phases.includes(7);
  
  // NEMA ring
  const nema=`<div style="font-size:8px;color:var(--dm)">Ring 1</div>
    <div class="nr">${[1,2].map(p=>`<div class="np r1${phSet.has(p)?' act':''}">Φ${p}<br>${NEMA[p]}</div>`).join('')}<div class="nb"></div>${[3,4].map(p=>`<div class="np r1${phSet.has(p)?' act':''}">Φ${p}<br>${NEMA[p]}</div>`).join('')}</div>
    <div style="font-size:8px;color:var(--dm);margin-top:3px">Ring 2</div>
    <div class="nr">${[5,6].map(p=>`<div class="np r2${phSet.has(p)?' act':''}">Φ${p}<br>${NEMA[p]}</div>`).join('')}<div class="nb"></div>${[7,8].map(p=>`<div class="np r2${phSet.has(p)?' act':''}">Φ${p}<br>${NEMA[p]}</div>`).join('')}</div>`;
  const dots='<div class="ph-bar">'+[1,2,3,4,5,6,7,8].map(p=>`<div class="ph-d ${phSet.has(p)?'on':'off'}">${p}</div>`).join('')+'</div>';

  // Phase images
  let phImgs='';
  if(plan1.length>0){
    phImgs='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px;margin:6px 0">'+plan1.map(ph=>{
      const fname='Node'+s.nid+'_Plan'+planKey+'_Phase'+ph+'.jpg';
      return `<div style="background:var(--bg);border:1px solid var(--bd);border-radius:6px;overflow:hidden;cursor:pointer" onclick="window.open('Tempe_img/${fname}','_blank')">
        <img src="Tempe_img/${fname}" alt="Phase ${ph}" style="width:100%;display:block" onerror="this.parentElement.style.display='none'">
        <div style="padding:3px 5px;font-size:8px;text-align:center">Phase ${ph} <span class="bg bg-g">Φ${ph} ${NEMA[ph]||''}</span></div>
      </div>`;
    }).join('')+'</div>';
  }

  // Base intersection image
  let baseImg='';
  if(s.bimg){
    baseImg=`<div style="margin:6px 0;cursor:pointer" onclick="window.open('Tempe_img/${s.bimg}','_blank')">
      <img src="Tempe_img/${s.bimg}" alt="Intersection" style="width:100%;border-radius:6px;border:1px solid var(--bd)" onerror="this.parentElement.innerHTML='<div class=\\'nt nt-y\\'>Image not available — place HTML next to Tempe_img/ folder</div>'">
      <div style="font-size:8px;color:var(--dm);margin-top:2px;text-align:center">Intersection Geometry — count lanes per approach</div>
    </div>`;
  }

  // Plan tabs
  let planTabs='';
  const planKeys=Object.keys(s.plans);
  if(planKeys.length>1){
    planTabs='<div style="display:flex;gap:3px;margin-bottom:6px">'+planKeys.map(p=>
      `<span style="padding:2px 8px;border-radius:4px;font-size:8px;font-weight:600;background:${p===planKey?'var(--bll)':'var(--bg)'};color:${p===planKey?'var(--bl)':'var(--dm)'};border:1px solid ${p===planKey?'var(--bl)':'var(--bd)'}">Plan ${p} (${s.plans[p].length} phases)</span>`
    ).join('')+'</div>';
  }

  // Timing table
  let timH='';
  if(s.xg&&s.xg.length){
    timH='<table class="dt"><tr><th></th>'+s.phases.map(p=>'<th>Φ'+p+'</th>').join('')+'</tr>';
    if(s.mg.length)timH+='<tr><td>Min Green</td>'+s.mg.map(v=>'<td>'+v+'</td>').join('')+'</tr>';
    if(s.xg.length)timH+='<tr><td>Max Green</td>'+s.xg.map(v=>'<td style="color:var(--gn)"><b>'+v+'</b></td>').join('')+'</tr>';
    if(s.yw.length)timH+='<tr><td>Yellow</td>'+s.yw.map(v=>'<td style="color:var(--yl)">'+v+'</td>').join('')+'</tr>';
    if(s.rc.length)timH+='<tr><td>Red Clr</td>'+s.rc.map(v=>'<td style="color:var(--rd)">'+v+'</td>').join('')+'</tr>';
    if(s.sp.length)timH+='<tr><td>Split</td>'+s.sp.map(v=>'<td style="color:var(--bl)"><b>'+v+'</b></td>').join('')+'</tr>';
    timH+='</table>';
  }
  let tbar='';
  if(s.sp&&s.sp.length>=2){
    const tot=s.sp.reduce((a,v)=>a+parseFloat(v||0),0)||(s.cycle||80);
    tbar='<div class="tbar">'+s.sp.map((v,i)=>{const pct=parseFloat(v||0)/tot*100;if(pct<1)return'';return `<div class="tg" style="flex:${pct}">Φ${s.phases[i]} ${v}s</div><div class="ty" style="flex:${((parseFloat(s.yw[i]||4)+parseFloat(s.rc[i]||2))/tot*100)}"></div>`}).join('')+'</div>';
  }

  const nrby=nearStops(s.lat,s.lon,600);
  el.innerHTML=`
    <div class="cd"><h3><span class="i">🚦</span>Signal Detail</h3>
      <div style="font-size:13px;font-weight:700;color:var(--wh);margin-bottom:3px">${s.name}</div>
      <div style="font-size:8px;color:var(--dm)">Node ${s.nid} · ${s.corridor.replace('_',' ')} · ${s.lat.toFixed(4)}°N, ${Math.abs(s.lon).toFixed(4)}°W</div>
      <div style="margin-top:4px"><span class="bg" style="background:${PC(s.n_phases)}20;color:${PC(s.n_phases)};font-size:10px;padding:2px 7px">${s.n_phases}-phase</span><span style="font-size:9px;color:var(--dm);margin-left:5px">${PH_DESC[s.n_phases]||''}</span></div>
    </div>
    <div class="cd"><h3><span class="i">🛰️</span>Intersection Geometry</h3>
      ${baseImg}
      <div class="nt nt-b">↑ Count lanes per approach. Compare with satellite view on the map (zoom in!).</div>
    </div>
    <div class="cd"><h3><span class="i">📷</span>Signal Phase Images <span class="bg" style="background:${PC(s.n_phases)}20;color:${PC(s.n_phases)}">${plan1.length} phases</span></h3>
      ${planTabs}
      <div class="nt nt-g" style="margin-bottom:5px">🟢 = Green arrow (protected) · 🔴 = Red (stopped). Match each image to a NEMA phase.</div>
      ${phImgs}
    </div>
    <div class="cd"><h3><span class="i">📐</span>NEMA Phases</h3>${dots}${nema}
      <div style="font-size:8px;color:var(--dm);margin-top:5px">
        <b>Green</b> = active phases. Gray = skipped.
        ${s.n_phases<=2?'<br><b>Note:</b> 2-phase = left turns PERMITTED (yield to oncoming). No green arrow.':''}
        ${s.n_phases>=8?'<br><b>Note:</b> 8-phase = full protection for all 4 left turns. Most lost time (~44s/cycle).':''}
      </div>
    </div>
    <div class="cd"><h3><span class="i">⏱️</span>Timing Parameters</h3>
      <table class="dt"><tr><td>Controller</td><td>${s.ctrl||'—'}</td></tr><tr><td>Cycle Length</td><td style="color:var(--bl)"><b>${s.cycle||'—'} sec</b></td></tr><tr><td>Offset</td><td>${s.offset||'—'} sec</td></tr><tr><td># Plans (TOD)</td><td>${s.n_plans}</td></tr><tr><td># Active Phases</td><td>${s.n_phases} → [${s.phases.join(', ')}]</td></tr><tr><td>Lost Time (est.)</td><td style="color:var(--yl)">~${Math.round(s.n_phases*5.5)}s (${s.n_phases}ph × 5.5s)</td></tr><tr><td>Eff. Green</td><td style="color:var(--gn)">${s.cycle?'~'+Math.round(s.cycle-s.n_phases*5.5)+'s':'—'}</td></tr></table>
    </div>
    ${timH?`<div class="cd"><h3><span class="i">📊</span>Phase Timing Detail (Plan ${planKey})</h3>${timH}${tbar}</div>`:''}
    <div class="cd"><h3><span class="i">📝</span>CEE 372 Checklist — Node ${s.nid}</h3>
      <div style="font-size:9px;line-height:1.8;color:var(--tx)">
        <div>☐ <b>1.</b> Count lanes: NB(L_ T_ R_) SB(L_ T_ R_) EB(L_ T_ R_) WB(L_ T_ R_)</div>
        <div>☐ <b>2.</b> View ${plan1.length} phase images → confirm phases: [${s.phases.join(', ')}]</div>
        <div>☐ <b>3.</b> Map each green arrow to its NEMA phase number</div>
        <div>☐ <b>4.</b> Left-turn treatment: <b>${hasLeft?'PROTECTED (green arrows)':'PERMITTED (no LT phases)'}</b></div>
        <div>☐ <b>5.</b> Draw the ring-barrier diagram for this ${s.n_phases}-phase signal</div>
        <div>☐ <b>6.</b> Cycle=${s.cycle||'?'}s, Lost≈${Math.round(s.n_phases*5.5)}s, Eff Green≈${s.cycle?Math.round(s.cycle-s.n_phases*5.5):'?'}s</div>
        <div>☐ <b>7.</b> Leading-left or lead-lag? Check Ring 1 vs Ring 2 order.</div>
      </div>
    </div>
    ${nrby.length>0?`<div class="cd"><h3><span class="i">📍</span>Nearby Transit Stops (600m) — ${nrby.length}</h3>
      ${nrby.slice(0,10).map(n=>`<div class="prox-item" onclick="selSta={id:'${n.id}',d:STOPS['${n.id}']};selSig=null;rp();map.setView([STOPS['${n.id}'][1],STOPS['${n.id}'][2]],17)"><div class="prox-icon" style="background:var(--gnl);color:var(--gn)">📍</div><div><div style="font-size:9px;font-weight:600">${n.name}</div><div style="font-size:7px;color:var(--dm)">${JUR_NAMES[n.jur]||n.jur} · ID:${n.id}</div></div><div class="prox-dist">${fd(n.dist)}</div></div>`).join('')}
      <div class="nt nt-g"><b>TSP Candidate:</b> ${nrby.length} stop(s) within 600m. Nearest: <b>${nrby[0].name}</b> at ${fd(nrby[0].dist)}.</div>
    </div>`:''}`;
}

function rstaDet(el){
  const s=selSta.d;const sid=selSta.id;
  highlightStop(sid,s);
  const nrSig=nearSigs(s[1],s[2],500);
  const nrSt=nearStops(s[1],s[2],300).filter(n=>n.id!==sid);
  // Find which routes might serve this stop (by proximity to route shapes)
  const nearRoutes=[];
  for(const[rid,pts]of Object.entries(SHAPES)){
    if(!pts)continue;
    let minD=Infinity;
    for(let i=0;i<pts.length;i+=Math.max(1,Math.floor(pts.length/30))){
      const d=dist([s[1],s[2]],pts[i]);
      if(d<minD)minD=d;
    }
    if(minD<150)nearRoutes.push({rid,dist:minD,name:RT[rid]?`${RT[rid].s} - ${RT[rid].l}`:rid,cat:RCAT[rid]||'local'});
  }
  nearRoutes.sort((a,b)=>a.dist-b.dist);

  el.innerHTML=`
    <div class="cd"><h3><span class="i">📍</span>Stop Detail</h3>
      <div style="font-size:13px;font-weight:700;color:var(--wh);margin-bottom:3px">${s[0]}</div>
      <div style="font-size:8px;color:var(--dm)">Stop ID: ${sid} · ${JUR_NAMES[s[3]]||s[3]} · ${s[1].toFixed(5)}, ${s[2].toFixed(5)}</div>
      <div style="margin-top:4px">${s[4]?'<span class="bg bg-g">Equipment Present</span>':'<span class="bg" style="background:rgba(90,106,130,.15);color:var(--dm)">Flag Stop (no equipment)</span>'}</div>
    </div>
    ${nearRoutes.length>0?`<div class="cd"><h3><span class="i">🚌</span>Routes Serving This Stop (~${nearRoutes.length})</h3>
      ${nearRoutes.slice(0,12).map(n=>`<div class="prox-item" onclick="selRt='${n.rid}';selSta=null;rp()"><div class="prox-icon" style="background:${RC_COLORS[n.cat]}20;color:${RC_COLORS[n.cat]}">🚌</div><div><div style="font-size:9px;font-weight:600">${n.name}</div><div style="font-size:7px;color:var(--dm)">${RC_LABELS[n.cat]} · ${RS[n.rid]?RS[n.rid].trips+' trips':'?'}</div></div><div class="prox-dist">${fd(n.dist)}</div></div>`).join('')}
    </div>`:''}
    ${nrSig.length>0?`<div class="cd"><h3><span class="i">🚦</span>Nearby Signals (500m) — ${nrSig.length}</h3>
      ${nrSig.slice(0,8).map(n=>`<div class="prox-item" onclick="selSig=${n.idx};selSta=null;rp();map.setView([SIG[${n.idx}].lat,SIG[${n.idx}].lon],17)"><div class="prox-icon" style="background:${PC(n.n)}20;color:${PC(n.n)}">${n.n}</div><div><div style="font-size:9px;font-weight:600">${n.name}</div><div style="font-size:7px;color:var(--dm)">${n.n}-phase · ${n.c||'?'}s</div></div><div class="prox-dist">${fd(n.dist)}</div></div>`).join('')}
      <div class="nt nt-y"><b>Signal Context:</b> ${nrSig.length} signal(s) near this stop. ${nrSig.filter(n=>n.n>=6).length} complex (≥6ph). Avg cycle: ${nrSig.filter(n=>n.c).length?Math.round(nrSig.filter(n=>n.c).reduce((a,n)=>a+n.c,0)/nrSig.filter(n=>n.c).length)+'s':'N/A'}.</div>
    </div>`:''}
    ${nrSt.length>0?`<div class="cd"><h3><span class="i">🔗</span>Nearby Stops (300m) — ${nrSt.length}</h3>
      ${nrSt.slice(0,8).map(n=>`<div class="prox-item" onclick="selSta={id:'${n.id}',d:STOPS['${n.id}']};rp();map.setView([STOPS['${n.id}'][1],STOPS['${n.id}'][2]],17)"><div class="prox-icon" style="background:var(--gnl);color:var(--gn)">📍</div><div><div style="font-size:9px;font-weight:600">${n.name}</div><div style="font-size:7px;color:var(--dm)">${JUR_NAMES[n.jur]||n.jur}</div></div><div class="prox-dist">${fd(n.dist)}</div></div>`).join('')}
    </div>`:''}`;
}

rp();
</script></body></html>
