<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f9fb;--bg2:#fff;--bg3:#f0f2f6;--bg4:#e2e6ed;--tx:#1a1d24;--tx2:#4b5563;--tx3:#9ca3af;--blu:#1d4ed8;--blu2:#3b82f6;--blul:#eff6ff;--grn:#059669;--grnl:#ecfdf5;--amb:#d97706;--ambl:#fffbeb;--red:#dc2626;--redl:#fef2f2;--vio:#7c3aed;--viol:#f5f3ff;--brd:#e5e7eb;--r:8px;--r2:12px}
html,body{height:100%;font-family:'Libre Franklin',sans-serif;background:var(--bg);color:var(--tx);font-size:13px}
.app{height:100vh;display:grid;grid-template-rows:auto auto 1fr;grid-template-columns:320px 1fr 440px}
.topbar{grid-column:1/-1;padding:12px 20px;background:var(--bg2);border-bottom:2px solid var(--blu);display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:700;color:var(--blu)}
.topbar .sub{font-size:11px;color:var(--tx2)}
/* Corridor tabs */
.corr-bar{grid-column:1/-1;display:flex;background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 8px;overflow-x:auto;gap:0}
.ctab{padding:6px 12px;font-size:10px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s}
.ctab:hover{color:var(--tx);background:var(--bg3)}.ctab.on{color:var(--blu);border-bottom-color:var(--blu);font-weight:700;background:var(--blul)}
.ctab .cnt{font-size:9px;color:var(--tx3);margin-left:2px}
/* Left: signal list */
.left{overflow-y:auto;border-right:1px solid var(--brd);background:var(--bg2);padding:8px}
.sig{padding:6px 8px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .1s}
.sig:hover{border-color:var(--blu);background:var(--blul)}
.sig.on{border-color:var(--blu);background:var(--blul);box-shadow:inset 3px 0 0 var(--blu)}
.sig-nm{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sig-sub{font-size:9px;color:var(--tx2);margin-top:1px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700}
.b2{background:var(--grnl);color:var(--grn)}.b4{background:var(--blul);color:var(--blu)}.b6{background:var(--ambl);color:var(--amb)}.b8{background:var(--redl);color:var(--red)}.bx{background:var(--viol);color:var(--vio)}
/* Center: map */
.center{position:relative}
#map{width:100%;height:100%}
.map-mode{position:absolute;top:8px;right:8px;z-index:1000;display:flex;gap:3px}
.mm{padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.92);border:1px solid var(--brd);font-size:10px;cursor:pointer;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.mm:hover,.mm.on{border-color:var(--blu);color:var(--blu);background:#fff}
/* Right: detail */
.right{overflow-y:auto;border-left:1px solid var(--brd);background:var(--bg2);padding:0}
.sec{padding:12px 14px;border-bottom:1px solid var(--brd)}
.sec h3{font-size:13px;font-weight:700;color:var(--blu);margin-bottom:6px}
.sec h4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
/* Images */
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
.img-grid.single{grid-template-columns:1fr}
.img-card{border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;background:var(--bg3);cursor:pointer;transition:all .15s}
.img-card:hover{border-color:var(--blu);box-shadow:0 2px 8px rgba(29,78,216,.15)}
.img-card img{width:100%;display:block;background:#222}
.img-card .cap{padding:4px 6px;font-size:9px;font-weight:600;color:var(--tx2);text-align:center;background:var(--bg2)}
.img-card .cap .ph-badge{font-size:8px;padding:1px 4px;border-radius:3px;margin-left:3px}
/* Phase bar */
.phase-bar{display:flex;gap:3px;margin:6px 0;flex-wrap:wrap}
.ph-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'IBM Plex Mono';font-weight:700;cursor:pointer;transition:all .12s;border:2px solid var(--brd)}
.ph-dot:hover{transform:scale(1.15)}.ph-dot.active{border-color:var(--grn);background:var(--grnl);color:var(--grn)}.ph-dot.inactive{border-color:var(--brd);background:var(--bg3);color:var(--tx3);opacity:.5}
/* NEMA ring */
.nr{display:flex;gap:2px;margin:3px 0}
.np{flex:1;text-align:center;padding:5px 2px;border-radius:6px;font-size:9px;font-family:'IBM Plex Mono';font-weight:600;line-height:1.25;transition:all .15s}
.np.r1{background:rgba(29,78,216,.06);color:var(--blu);border:1.5px solid rgba(29,78,216,.15)}
.np.r2{background:var(--viol);color:var(--vio);border:1.5px solid rgba(124,58,237,.15)}
.np.on{background:var(--grnl)!important;border-color:var(--grn)!important;color:var(--grn)!important;font-weight:800}
.nb{width:3px;background:var(--amb);border-radius:2px}
/* Data table */
.dt{width:100%;font-size:11px;border-collapse:collapse}
.dt th{text-align:left;font-weight:600;padding:4px 6px;border-bottom:2px solid var(--brd);font-size:9px;color:var(--tx3);text-transform:uppercase}
.dt td{padding:3px 6px;border-bottom:1px solid var(--brd);font-family:'IBM Plex Mono';font-size:11px}
.dt tr:hover td{background:var(--bg3)}
/* Timing bar */
.tbar{display:flex;gap:1px;height:24px;border-radius:5px;overflow:hidden;margin:4px 0;background:var(--bg3)}
.tg{background:var(--grn);color:#fff;font-size:7px;font-family:'IBM Plex Mono';font-weight:700;display:flex;align-items:center;justify-content:center}
.ty{background:#eab308;font-size:7px;display:flex;align-items:center;justify-content:center}
.tr{background:var(--red);opacity:.3}
/* Highlight box */
.hi{padding:8px 10px;border-radius:6px;font-size:11px;line-height:1.5;margin:6px 0}
.hi-b{background:var(--blul);border-left:3px solid var(--blu);color:var(--blu)}
.hi-a{background:var(--ambl);border-left:3px solid var(--amb)}
.hi-g{background:var(--grnl);border-left:3px solid var(--grn)}
/* Checklist */
.chk{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:11px;line-height:1.4}
.cb{width:16px;height:16px;border:2px solid var(--brd);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .1s}
.cb:hover{border-color:var(--blu)}.cb.d{background:var(--grn);border-color:var(--grn);color:#fff}
/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;cursor:pointer}
.lb.show{display:flex}
.lb img{max-width:90%;max-height:90%;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,.5)}
.lb .close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style></head><body>

  const m=L.circleMarker([s.lat,s.lon],{radius:7,fillColor:c,color:'#fff',weight:2,fillOpacity:.9});
  m.on('click',()=>sel(i));
  m.addTo(map);
  markers[i]=m;
});

// Corridor tabs
function buildCorrs(){
  const el=document.getElementById('corrBar');
  CORRS.forEach(c=>{
    const n=c==='All'?D.length:D.filter(s=>s.corridor===c||s.corridor===c.replace('_',' ')).length;
    if(n===0&&c!=='All')return;
    const t=document.createElement('div');
    t.className='ctab'+(c===curCorr?' on':'');
    t.innerHTML=c.replace('_',' ')+'<span class="cnt">('+n+')</span>';
    t.onclick=()=>{curCorr=c;curSig=null;render()};
    el.appendChild(t);
  });
}

function filtered(){
  if(curCorr==='All')return D;
  return D.filter(s=>s.corridor===curCorr||s.corridor===curCorr.replace('_',' '));
}

function sel(i){curSig=i;render();if(D[i].lat)map.setView([D[i].lat,D[i].lon],17)}
function showImg(src){document.getElementById('lbImg').src=src;document.getElementById('lb').classList.add('show')}

function render(){
  // Update corridor tabs
  document.querySelectorAll('.ctab').forEach(t=>{
    const c=t.textContent.split('(')[0].trim().replace(' ','_');
    t.classList.toggle('on',c===curCorr||t.textContent.startsWith(curCorr.replace('_',' ')));
  });

  // Left panel: signal list
  const lp=document.getElementById('left');
  const list=filtered();
  lp.innerHTML='<div style="font-size:10px;color:var(--tx3);margin-bottom:6px;font-weight:600">'+list.length+' intersections'+(curCorr!=='All'?' on '+curCorr.replace('_',' '):'')+'</div>'+
    list.map((s,li)=>{
      const gi=D.indexOf(s);
      return '<div class="sig'+(curSig===gi?' on':'')+'" onclick="sel('+gi+')"><div class="sig-nm">'+s.name+'</div><div class="sig-sub"><span class="badge '+PH_CLS(s.n_phases)+'">'+s.n_phases+'ph</span><span style="font-family:IBM Plex Mono;font-size:9px">'+(s.cycle||'?')+'s</span><span style="font-size:9px;color:var(--tx3)">'+s.n_plans+' plans</span></div></div>';
    }).join('');

  // Right panel
  if(curSig!==null) showDetail(D[curSig]);
  else showOverview();
}

function showOverview(){
  const rp=document.getElementById('right');
  const list=filtered();
  // Phase distribution for current filter
  const ph={};list.forEach(s=>{ph[s.n_phases]=(ph[s.n_phases]||0)+1});
  
  rp.innerHTML=`
    <div class="sec"><h3>${curCorr==='All'?'All Tempe Signals':curCorr.replace('_',' ')+' Corridor'}</h3>
      <div style="font-size:11px;color:var(--tx2)">${list.length} intersections · Click any to explore phase images + timing data</div>
      <div class="hi hi-a" style="margin-top:8px"><b>Instructions:</b> Use <b>satellite view</b> (default) to count lanes per approach. Click an intersection to see its NEMA phase images, timing parameters, and student checklist.</div>
    </div>
    <div class="sec"><h4>Phase Distribution</h4>
      <table class="dt"><tr><th>Phases</th><th>Count</th><th>Meaning</th></tr>
      ${Object.entries(ph).sort((a,b)=>a[0]-b[0]).map(([p,n])=>
        '<tr><td><span class="badge '+PH_CLS(+p)+'">'+p+'-phase</span></td><td>'+n+'</td><td style="font-family:Libre Franklin;font-size:10px">'+(PH_DESC[+p]||'')+'</td></tr>'
      ).join('')}</table>
    </div>
    <div class="sec"><h4>NEMA 8-Phase Reference</h4>
      <div style="font-size:9px;color:var(--tx3)">Ring 1</div>
      <div class="nr"><div class="np r1">Φ1<br><b>WBL</b></div><div class="np r1">Φ2<br><b>EBT</b></div><div class="nb"></div><div class="np r1">Φ3<br><b>NBL</b></div><div class="np r1">Φ4<br><b>SBT</b></div></div>
      <div style="font-size:9px;color:var(--tx3);margin-top:4px">Ring 2</div>
      <div class="nr"><div class="np r2">Φ5<br><b>EBL</b></div><div class="np r2">Φ6<br><b>WBT</b></div><div class="nb"></div><div class="np r2">Φ7<br><b>SBL</b></div><div class="np r2">Φ8<br><b>NBT</b></div></div>
      <div class="hi hi-b" style="margin-top:6px"><b>Key rule:</b> Green arrows in images = protected movements. Red arrows = stopped. Match each image to a NEMA phase by identifying which movements have green arrows.</div>
    </div>
    <div class="sec"><h4>Student Reporting Checklist</h4>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>1.</b> Count lanes per approach using satellite view (NB/SB/EB/WB × L/T/R)</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>2.</b> View phase images → identify which NEMA phases (Φ1-Φ8) are active</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>3.</b> Determine left-turn treatment: protected, permitted, or prot-perm?</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>4.</b> Draw the ring-barrier timing diagram with green splits</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>5.</b> Check for lead-lag (compare Ring 1 vs Ring 2 sequence)</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>6.</b> Calculate total lost time = # phases × (Yellow + All-Red)</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>7.</b> Identify the critical lane group per phase (highest v/s)</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>8.</b> Compare with your other assigned intersection</div></div>
    </div>`;
}

function showDetail(s){
  const rp=document.getElementById('right');
  const phSet=new Set(s.phases);
  
  // Build phase images grid
  const plan1=s.plans['1']||s.plans[Object.keys(s.plans)[0]]||[];
  const planKey=Object.keys(s.plans)[0]||'1';
  
  let phaseImgsHtml='';
  if(plan1.length>0){
    phaseImgsHtml='<div class="img-grid">'+plan1.map(ph=>{
      const fname='Node'+s.nid+'_Plan'+planKey+'_Phase'+ph+'.jpg';
      const src=imgPath(s,fname);
      return '<div class="img-card" onclick="showImg(\''+src+'\')"><img src="'+src+'" alt="Phase '+ph+'" onerror="this.style.display=\'none\'"><div class="cap">Phase '+ph+' <span class="ph-badge" style="background:var(--grnl);color:var(--grn)">Φ'+ph+' '+( NEMA[ph]||'')+'</span></div></div>';
    }).join('')+'</div>';
  }
  
  // Base intersection image
  let baseImgHtml='';
  if(s.base_img){
    const bsrc=imgPath(s,s.base_img);
    baseImgHtml='<div class="img-grid single"><div class="img-card" onclick="showImg(\''+bsrc+'\')"><img src="'+bsrc+'" alt="Intersection geometry"><div class="cap">Intersection Geometry — count lanes here + use satellite</div></div></div>';
  }
  
  // NEMA ring with active phases highlighted
  const nemaHtml=`
    <div style="font-size:9px;color:var(--tx3)">Ring 1</div>
    <div class="nr"><div class="np r1 ${phSet.has(1)?'on':''}">Φ1<br>WBL</div><div class="np r1 ${phSet.has(2)?'on':''}">Φ2<br>EBT</div><div class="nb"></div><div class="np r1 ${phSet.has(3)?'on':''}">Φ3<br>NBL</div><div class="np r1 ${phSet.has(4)?'on':''}">Φ4<br>SBT</div></div>
    <div style="font-size:9px;color:var(--tx3);margin-top:4px">Ring 2</div>
    <div class="nr"><div class="np r2 ${phSet.has(5)?'on':''}">Φ5<br>EBL</div><div class="np r2 ${phSet.has(6)?'on':''}">Φ6<br>WBT</div><div class="nb"></div><div class="np r2 ${phSet.has(7)?'on':''}">Φ7<br>SBL</div><div class="np r2 ${phSet.has(8)?'on':''}">Φ8<br>NBT</div></div>`;
  
  // Phase dots
  const dotsHtml='<div class="phase-bar">'+[1,2,3,4,5,6,7,8].map(p=>
    '<div class="ph-dot '+(phSet.has(p)?'active':'inactive')+'">'+p+'</div>'
  ).join('')+'</div>';
  
  // Timing table
  const mg=s.min_green||[],xg=s.max_green||[],yw=s.yellow||[],rc=s.red_clear||[],sp=s.split||[];
  let timingHtml='';
  if(mg.length||xg.length){
    timingHtml='<table class="dt"><tr><th></th>'+plan1.map(p=>'<th>Φ'+p+'</th>').join('')+'</tr>';
    if(mg.length) timingHtml+='<tr><td>Min Green</td>'+mg.map(v=>'<td>'+v+'</td>').join('')+'</tr>';
    if(xg.length) timingHtml+='<tr><td>Max Green</td>'+xg.map(v=>'<td><b>'+v+'</b></td>').join('')+'</tr>';
    if(yw.length) timingHtml+='<tr><td>Yellow</td>'+yw.map(v=>'<td>'+v+'</td>').join('')+'</tr>';
    if(rc.length) timingHtml+='<tr><td>Red Clear</td>'+rc.map(v=>'<td>'+v+'</td>').join('')+'</tr>';
    if(sp.length) timingHtml+='<tr><td>Split</td>'+sp.map(v=>'<td style="color:var(--blu)"><b>'+v+'</b></td>').join('')+'</tr>';
    timingHtml+='</table>';
  }
  
  // Timing bar visualization
  let tbarHtml='';
  if(sp.length>=2){
    const total=sp.reduce((a,v)=>a+parseFloat(v||0),0)||(s.cycle||80);
    tbarHtml='<div class="tbar">'+sp.map((v,i)=>{
      const pct=parseFloat(v||0)/total*100;
      if(pct<1)return'';
      const ph=plan1[i]||i+1;
      return '<div class="tg" style="flex:'+pct+'">Φ'+ph+' '+v+'s</div><div class="ty" style="flex:'+((parseFloat(yw[i]||4)+parseFloat(rc[i]||2))/total*100)+'">Y</div>';
    }).join('')+'</div>';
  }
  
  // Plan tabs if multiple
  let planTabHtml='';
  if(Object.keys(s.plans).length>1){
    planTabHtml='<div style="display:flex;gap:4px;margin-bottom:6px">'+Object.keys(s.plans).map(p=>
      '<span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;background:'+(p===planKey?'var(--blul)':'var(--bg3)')+';color:'+(p===planKey?'var(--blu)':'var(--tx3)')+';cursor:pointer">Plan '+p+' ('+s.plans[p].length+' phases)</span>'
    ).join('')+'</div>';
  }

  rp.innerHTML=`
    <div class="sec">
      <h3>${s.name}</h3>
      <div style="font-size:10px;color:var(--tx2)">Node ${s.nid} · ${s.corridor.replace('_',' ')} · ${s.lat.toFixed(4)}°N, ${Math.abs(s.lon).toFixed(4)}°W</div>
      <div style="margin-top:6px"><span class="badge ${PH_CLS(s.n_phases)}" style="font-size:10px;padding:2px 8px">${s.n_phases}-phase</span>
      <span style="font-size:10px;color:var(--tx2);margin-left:6px">${PH_DESC[s.n_phases]||''}</span></div>
    </div>
    <div class="sec"><h4>Intersection Geometry <span class="badge b2">Satellite + Image</span></h4>
      ${baseImgHtml}
      <div class="hi hi-b" style="margin-top:4px">↑ Count lanes per approach. Compare with satellite view on the map (zoom in!).</div>
    </div>
    <div class="sec"><h4>Signal Phase Images <span class="badge ${PH_CLS(s.n_phases)}">${s.n_phases} active phases</span></h4>
      ${planTabHtml}
      <div class="hi hi-g">🟢 = Green arrow (protected movement) · 🔴 = Red (stopped). Match each image to a NEMA phase number.</div>
      ${phaseImgsHtml}
    </div>
    <div class="sec"><h4>NEMA Phases — Active at This Intersection</h4>
      ${dotsHtml}
      ${nemaHtml}
      <div style="font-size:10px;color:var(--tx2);margin-top:6px">
        <b>Green-highlighted</b> = phases active at this intersection. Gray = skipped (not enough demand for that movement).
        ${s.n_phases<=2?'<br><b>Note:</b> 2-phase means left turns are PERMITTED (yield to oncoming). No green arrow — drivers must find gaps.':''}
        ${s.n_phases>=8?'<br><b>Note:</b> 8-phase = full protection for all 4 left turns. This has the most lost time (~32s per cycle).':''}
      </div>
    </div>
    <div class="sec"><h4>Timing Parameters</h4>
      <table class="dt">
        <tr><td>Controller</td><td>${s.ctrl||'—'}</td></tr>
        <tr><td>Cycle Length</td><td><b>${s.cycle||'—'} sec</b></td></tr>
        <tr><td>Offset</td><td>${s.offset||'—'} sec</td></tr>
        <tr><td># Plans (TOD)</td><td>${s.n_plans}</td></tr>
        <tr><td># Active Phases</td><td>${s.n_phases} → [${s.phases.join(', ')}]</td></tr>
        <tr><td>Lost Time (est.)</td><td>~${s.n_phases*(4+1.5)} sec (${s.n_phases}ph × ~5.5s)</td></tr>
      </table>
    </div>
    ${timingHtml?'<div class="sec"><h4>Phase Timing Detail (Plan 1)</h4>'+timingHtml+tbarHtml+'</div>':''}
    <div class="sec"><h4>Student Checklist for Node ${s.nid}</h4>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>1.</b> Count lanes from satellite: NB(L__ T__ R__) SB(L__ T__ R__) EB(L__ T__ R__) WB(L__ T__ R__)</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>2.</b> View ${plan1.length} phase images above → confirm active phases: [${s.phases.join(',')}]</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>3.</b> Map each green arrow to NEMA phase: which movements are served?</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>4.</b> Left-turn treatment: ${s.phases.includes(1)||s.phases.includes(3)||s.phases.includes(5)||s.phases.includes(7)?'PROTECTED (green arrows exist)':'PERMITTED (no left-turn phases)'}</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>5.</b> Draw the ring-barrier diagram for this ${s.n_phases}-phase signal</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>6.</b> Cycle = ${s.cycle||'?'}s. Lost time ≈ ${s.n_phases}×5.5 = ${Math.round(s.n_phases*5.5)}s. Effective green = ${s.cycle?Math.round(s.cycle-s.n_phases*5.5):'?'}s</div></div>
      <div class="chk"><div class="cb" onclick="this.classList.toggle('d')"></div><div><b>7.</b> Is this a leading-left or lead-lag sequence? Check Ring 1 vs Ring 2 order.</div></div>
    </div>`;
}

buildCorrs();
render();

</script></body></html>
